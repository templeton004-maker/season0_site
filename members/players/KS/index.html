<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Season 0 — Clubhouse</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink:            #080e0b;
      --surface:        rgba(8, 16, 12, 0.88);
      --gold:           #c9a84c;
      --gold-border:    rgba(201, 168, 76, 0.24);
      --gold-border-th: rgba(201, 168, 76, 0.32);
      --gold-dim:       rgba(201, 168, 76, 0.08);
      --gold-rule:      rgba(201, 168, 76, 0.10);
      --cream:          #f0ebe0;
      --cream-dim:      rgba(240, 235, 224, 0.50);
      --cream-faint:    rgba(240, 235, 224, 0.07);
      --green-glow:     rgba(18, 42, 26, 0.65);
      --pos:            #7ecf9e;
      --neg:            #d97b7b;
      --font-display:   'Playfair Display', Georgia, serif;
      --font-body:      'Libre Baskerville', Georgia, serif;
      --ease:           cubic-bezier(0.22, 1, 0.36, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; overflow-x: hidden; }

    body {
      font-family: var(--font-body);
      background: var(--ink);
      color: var(--cream);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse 80% 50% at 50% 0%, var(--green-glow) 0%, transparent 65%);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      opacity: 0.030;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    .rule-top {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      z-index: 10;
    }

    .back {
      position: fixed;
      top: 16px;
      left: 20px;
      z-index: 50;
      color: rgba(201,168,76,0.45);
      font-family: var(--font-body);
      font-size: 20px;
      text-decoration: none;
      line-height: 1;
      transition: color 0.2s ease;
    }
    .back:hover { color: var(--gold); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    .wrap {
      position: relative;
      z-index: 1;
      width: min(1100px, 92vw);
      margin: 0 auto;
      padding: 64px 0 90px;
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.8s var(--ease) 0.1s both;
    }

    .header::after {
      content: '';
      display: block;
      width: 36px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 22px auto 0;
    }

    .header__kicker {
      display: block;
      font-family: var(--font-body);
      font-size: 9px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .header__title {
      font-family: var(--font-display);
      font-size: clamp(52px, 9vw, 96px);
      font-weight: 400;
      font-style: italic;
      letter-spacing: -0.01em;
      color: var(--cream);
      margin: 0 0 8px;
      line-height: 0.92;
    }

    .header__sub {
      font-family: var(--font-body);
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--cream-dim);
    }

    .totals {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--gold-border);
      border: 1px solid var(--gold-border);
      margin-bottom: 28px;
      animation: fadeUp 0.8s var(--ease) 0.22s both;
    }

    /* ── Total stat — now a link ── */
    .total-stat {
      background: var(--ink);
      padding: clamp(16px, 3vw, 28px) clamp(10px, 2vw, 20px);
      text-align: center;
      transition: background 0.25s ease;
      cursor: pointer;
      text-decoration: none;
      display: block;
    }

    .total-stat:hover { background: rgba(201,168,76,0.08); }

    .total-stat__value {
      display: block;
      font-family: var(--font-display);
      font-size: clamp(30px, 5vw, 50px);
      font-weight: 400;
      line-height: 1;
      color: var(--cream);
      transition: transform 0.2s ease;
    }

    .total-stat:hover .total-stat__value { transform: scale(1.04); }

    .total-stat__value.pos { color: var(--pos); }
    .total-stat__value.neg { color: var(--neg); }

    .total-stat__label {
      display: block;
      margin-top: 8px;
      font-family: var(--font-body);
      font-size: 8px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.60);
    }

    /* Hint arrow on hover */
    .total-stat__arrow {
      display: block;
      margin-top: 6px;
      font-size: 9px;
      color: rgba(201,168,76,0);
      transition: color 0.2s ease;
      letter-spacing: 0.10em;
    }

    .total-stat:hover .total-stat__arrow { color: rgba(201,168,76,0.55); }

    .card {
      background: var(--surface);
      border: 1px solid var(--gold-border);
      padding: clamp(20px, 4vw, 34px);
      margin-bottom: 18px;
      backdrop-filter: blur(14px);
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 16px 48px rgba(0,0,0,0.4);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 32px; height: 32px;
      border-top: 1px solid rgba(201,168,76,0.40);
      border-left: 1px solid rgba(201,168,76,0.40);
    }

    .card::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 32px; height: 32px;
      border-bottom: 1px solid rgba(201,168,76,0.40);
      border-right: 1px solid rgba(201,168,76,0.40);
    }

    .card__label {
      font-family: var(--font-body);
      font-size: 9px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--gold);
      margin: 0 0 18px;
    }

    canvas { max-height: 270px; }

    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    .scores-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 660px;
      font-family: var(--font-body);
    }

    .scores-table thead tr { border-bottom: 1px solid var(--gold-border-th); }

    .scores-table th {
      padding: 10px 12px;
      text-align: left;
      color: var(--gold);
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .scores-table td {
      padding: 14px 12px;
      color: var(--cream);
      font-size: 13px;
      border-bottom: 1px solid var(--gold-rule);
      white-space: nowrap;
    }

    .scores-table tbody tr:last-child td { border-bottom: none; }
    .scores-table tbody tr { transition: background 0.2s ease; }
    .scores-table tbody tr:hover { background: rgba(201,168,76,0.04); }

    .rank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px; height: 20px;
      font-family: var(--font-display);
      font-style: italic;
      font-size: 11px;
      color: rgba(201,168,76,0.60);
      border: 1px solid rgba(201,168,76,0.18);
      margin-right: 10px;
    }

    .rank-1 {
      color: var(--gold);
      border-color: rgba(201,168,76,0.50);
      background: rgba(201,168,76,0.08);
    }

    /* ── Player name link ── */
    .player-link {
      text-decoration: none;
      color: inherit;
      transition: color 0.2s ease;
    }
    .player-link:hover .player-name { color: var(--gold); }
    .player-link:hover .player-id   { color: rgba(201,168,76,0.80); }

    .player-name {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.02em;
      transition: color 0.2s ease;
    }

    .player-id {
      margin-left: 6px;
      color: rgba(201,168,76,0.50);
      font-size: 9px;
      letter-spacing: 0.14em;
      transition: color 0.2s ease;
    }

    .money-pos { color: var(--pos); }
    .money-neg { color: var(--neg); }
    .money-eve { color: var(--cream); }

    .page-note {
      text-align: center;
      margin-top: 20px;
      font-family: var(--font-body);
      font-size: 9px;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.35);
    }

    @media (max-width: 600px) {
      .wrap          { padding: 32px 0 60px; }
      .header__title { font-size: 56px; }
      .totals        { grid-template-columns: repeat(2, 1fr); }
      .card          { padding: 18px 14px; }
    }
  </style>
</head>

<body>
  <div class="rule-top"></div>
  <a class="back" href="https://season0.pro/">←</a>

  <main class="wrap">

    <header class="header">
      <span class="header__kicker">Season 0</span>
      <h1 class="header__title">Round 1</h1>
      <span class="header__sub">Clubhouse Standings</span>
    </header>

    <div class="totals" id="seasonTotals"></div>

    <section class="card reveal">
      <p class="card__label">Round $</p>
      <canvas id="roundChart"></canvas>
    </section>

    <section class="card reveal">
      <p class="card__label">Full Scorecard</p>
      <div class="table-wrap">
        <table class="scores-table">
          <thead>
            <tr>
              <th>Player</th>
              <th>Round $</th>
              <th>Total</th>
              <th>Net</th>
              <th>Hole W</th>
              <th>Hole L</th>
              <th>Halves</th>
              <th>Birdies</th>
              <th>Wolf W</th>
              <th>Wolf L</th>
            </tr>
          </thead>
          <tbody id="roundTable"></tbody>
        </table>
      </div>
    </section>

    <p class="page-note">Ranked by Round $</p>

  </main>

  <script>
    const r1Data = [
      { playerId: "KS", player: "Kyle Story",        roundMoney: 160,  total: 75, net: 75, holeWins: 8,  holeLosses: 6, holeHalves: 4, birdies: 3, wolfWins: 4, wolfLosses: 0 },
      { playerId: "MJ", player: "Michael Jones",     roundMoney: 20,   total: 97, net: 79, holeWins: 10, holeLosses: 4, holeHalves: 4, birdies: 0, wolfWins: 2, wolfLosses: 1 },
      { playerId: "WT", player: "William Templeton", roundMoney: 0,    total: 85, net: 81, holeWins: 5,  holeLosses: 9, holeHalves: 4, birdies: 0, wolfWins: 3, wolfLosses: 2 },
      { playerId: "JT", player: "John Templeton",    roundMoney: -180, total: 80, net: 80, holeWins: 5,  holeLosses: 9, holeHalves: 4, birdies: 1, wolfWins: 0, wolfLosses: 3 }
    ];

    const ordered = [...r1Data].sort((a, b) => b.roundMoney - a.roundMoney);

    function moneyClass(v) { return v > 0 ? "money-pos" : v < 0 ? "money-neg" : "money-eve"; }
    function moneyText(v)  { return v > 0 ? "+$" + v : v < 0 ? "-$" + Math.abs(v) : "$0"; }

    function countUp(el, target, duration) {
      const start = performance.now();
      const isNeg = target < 0;
      const abs   = Math.abs(target);
      function step(now) {
        const p   = Math.min((now - start) / duration, 1);
        const e   = 1 - Math.pow(1 - p, 3);
        const cur = Math.round(e * abs);
        el.textContent = (isNeg ? "-$" : target > 0 ? "+$" : "$") + cur;
        if (p < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function buildTotals() {
      document.getElementById("seasonTotals").innerHTML = ordered.map(p => `
        <a class="total-stat" href="https://season0.pro/members/players/${p.playerId}/">
          <span class="total-stat__value ${p.roundMoney > 0 ? 'pos' : p.roundMoney < 0 ? 'neg' : ''}"
                data-target="${p.roundMoney}">$0</span>
          <span class="total-stat__label">${p.player.split(' ')[0]}</span>
          <span class="total-stat__arrow">→</span>
        </a>
      `).join("");

      setTimeout(() => {
        document.querySelectorAll(".total-stat__value[data-target]").forEach((el, i) => {
          setTimeout(() => countUp(el, parseInt(el.dataset.target), 900), i * 80);
        });
      }, 400);
    }

    document.getElementById("roundTable").innerHTML = ordered.map((p, i) => `
      <tr>
        <td>
          <span class="rank ${i === 0 ? 'rank-1' : ''}">${i + 1}</span>
          <a class="player-link" href="https://season0.pro/members/players/${p.playerId}/">
            <span class="player-name">${p.player}</span>
            <span class="player-id">${p.playerId}</span>
          </a>
        </td>
        <td class="${moneyClass(p.roundMoney)}">${moneyText(p.roundMoney)}</td>
        <td>${p.total}</td>
        <td>${p.net}</td>
        <td>${p.holeWins}</td>
        <td>${p.holeLosses}</td>
        <td>${p.holeHalves}</td>
        <td>${p.birdies}</td>
        <td>${p.wolfWins}</td>
        <td>${p.wolfLosses}</td>
      </tr>
    `).join("");

    new Chart(document.getElementById("roundChart"), {
      type: "bar",
      data: {
        labels: ordered.map(p => p.player.split(' ')[0]),
        datasets: [{
          label: "Round $",
          data: ordered.map(p => p.roundMoney),
          backgroundColor: ordered.map(p => p.roundMoney >= 0 ? "rgba(201,168,76,0.20)" : "rgba(217,123,123,0.20)"),
          borderColor:     ordered.map(p => p.roundMoney >= 0 ? "rgba(201,168,76,0.85)" : "rgba(217,123,123,0.85)"),
          borderWidth: 1,
          borderRadius: 2
        }]
      },
      options: {
        responsive: true,
        animation: { duration: 1000, easing: 'easeOutQuart' },
        plugins: { legend: { display: false } },
        scales: {
          x: {
            ticks: { color: "rgba(240,235,224,0.50)", font: { family: "'Libre Baskerville', Georgia, serif", size: 11 } },
            grid:  { color: "rgba(201,168,76,0.05)" }
          },
          y: {
            ticks: {
              color: "rgba(240,235,224,0.50)",
              font:  { family: "'Libre Baskerville', Georgia, serif", size: 10 },
              callback: v => (v >= 0 ? "+$" : "-$") + Math.abs(v)
            },
            grid: { color: "rgba(201,168,76,0.05)" }
          }
        }
      }
    });

    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
      });
    }, { threshold: 0.08 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    buildTotals();
  </script>
</body>
</html>
