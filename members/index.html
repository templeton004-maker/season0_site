<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Season 0 — Clubhouse</title>
  <script src="/members/data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink:         #080e0b;
      --surface:     rgba(8,16,12,0.88);
      --gold:        #c9a84c;
      --gold-border: rgba(201,168,76,0.24);
      --gold-rule:   rgba(201,168,76,0.10);
      --cream:       #f0ebe0;
      --cream-dim:   rgba(240,235,224,0.50);
      --green-glow:  rgba(18,42,26,0.65);
      --pos:         #7ecf9e;
      --neg:         #d97b7b;
      --font-display:'Playfair Display', Georgia, serif;
      --font-body:   'Libre Baskerville', Georgia, serif;
      --ease:        cubic-bezier(0.22,1,0.36,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; overflow-x: hidden; }

    body {
      font-family: var(--font-body);
      background: var(--ink);
      color: var(--cream);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse 80% 50% at 50% 0%, var(--green-glow) 0%, transparent 65%);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      opacity: 0.030;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    .rule-top {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      z-index: 10;
    }

    .back {
      position: fixed;
      top: 16px; left: 20px;
      z-index: 50;
      color: rgba(201,168,76,0.45);
      font-size: 20px;
      text-decoration: none;
      line-height: 1;
      transition: color 0.2s ease;
    }
    .back:hover { color: var(--gold); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    .wrap {
      position: relative;
      z-index: 1;
      width: min(1100px, 92vw);
      margin: 0 auto;
      padding: 64px 0 90px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.8s var(--ease) 0.1s both;
    }

    .header::after {
      content: '';
      display: block;
      width: 36px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 22px auto 0;
    }

    .header__kicker {
      display: block;
      font-size: 9px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .header__title {
      font-family: var(--font-display);
      font-size: clamp(52px, 9vw, 96px);
      font-weight: 400;
      font-style: italic;
      letter-spacing: -0.01em;
      color: var(--cream);
      margin: 0 0 8px;
      line-height: 0.92;
    }

    .header__sub {
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--cream-dim);
    }

    /* ── Season standings bar ── */
    .standings {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--gold-border);
      border: 1px solid var(--gold-border);
      margin-bottom: 28px;
      animation: fadeUp 0.8s var(--ease) 0.18s both;
    }

    .standing-stat {
      background: var(--ink);
      padding: clamp(16px,3vw,28px) clamp(10px,2vw,20px);
      text-align: center;
      text-decoration: none;
      display: block;
      transition: background 0.25s ease;
    }

    .standing-stat:hover { background: rgba(201,168,76,0.08); }

    .standing-stat__rank {
      display: block;
      font-family: var(--font-display);
      font-style: italic;
      font-size: 11px;
      color: rgba(201,168,76,0.45);
      margin-bottom: 4px;
    }

    .standing-stat__value {
      display: block;
      font-family: var(--font-display);
      font-size: clamp(26px,4.5vw,44px);
      font-weight: 400;
      line-height: 1;
      color: var(--cream);
      transition: transform 0.2s ease;
    }

    .standing-stat:hover .standing-stat__value { transform: scale(1.04); }
    .standing-stat__value.pos { color: var(--pos); }
    .standing-stat__value.neg { color: var(--neg); }

    .standing-stat__name {
      display: block;
      margin-top: 6px;
      font-size: 8px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.60);
    }

    .standing-stat__bankroll {
      display: block;
      margin-top: 4px;
      font-size: 8px;
      letter-spacing: 0.12em;
      color: rgba(240,235,224,0.28);
    }

    .standing-stat__arrow {
      display: block;
      margin-top: 6px;
      font-size: 9px;
      color: rgba(201,168,76,0);
      transition: color 0.2s ease;
    }

    .standing-stat:hover .standing-stat__arrow { color: rgba(201,168,76,0.55); }

    /* ── Latest round card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--gold-border);
      padding: clamp(20px,4vw,34px);
      margin-bottom: 18px;
      backdrop-filter: blur(14px);
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 16px 48px rgba(0,0,0,0.4);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 32px; height: 32px;
      border-top: 1px solid rgba(201,168,76,0.40);
      border-left: 1px solid rgba(201,168,76,0.40);
    }

    .card::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 32px; height: 32px;
      border-bottom: 1px solid rgba(201,168,76,0.40);
      border-right: 1px solid rgba(201,168,76,0.40);
    }

    .card__label {
      font-size: 9px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--gold);
      margin: 0 0 18px;
    }

    canvas { max-height: 270px; }

    /* ── Round result compact ── */
    .round-result {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: 1px;
      background: var(--gold-border);
      border: 1px solid var(--gold-border);
    }

    .round-result__player {
      background: var(--ink);
      padding: 16px 12px;
      text-align: center;
    }

    .round-result__name {
      display: block;
      font-size: 8px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.55);
      margin-bottom: 6px;
    }

    .round-result__money {
      display: block;
      font-family: var(--font-display);
      font-size: clamp(18px,3vw,28px);
      font-weight: 400;
      line-height: 1;
    }

    .round-result__money.pos { color: var(--pos); }
    .round-result__money.neg { color: var(--neg); }
    .round-result__money.eve { color: var(--cream-dim); }

    .round-result__sub {
      display: block;
      margin-top: 4px;
      font-size: 8px;
      color: rgba(240,235,224,0.28);
      letter-spacing: 0.10em;
    }

    /* ── Navigation row ── */
    .nav-row {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 12px;
      margin-bottom: 18px;
      animation: fadeUp 0.8s var(--ease) 0.30s both;
    }

    .nav-card {
      background: var(--surface);
      border: 1px solid var(--gold-border);
      padding: 24px 20px;
      text-decoration: none;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: background 0.25s ease, border-color 0.25s ease;
      backdrop-filter: blur(14px);
    }

    .nav-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 24px; height: 24px;
      border-top: 1px solid rgba(201,168,76,0.40);
      border-left: 1px solid rgba(201,168,76,0.40);
    }

    .nav-card::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 24px; height: 24px;
      border-bottom: 1px solid rgba(201,168,76,0.40);
      border-right: 1px solid rgba(201,168,76,0.40);
    }

    .nav-card:hover {
      background: rgba(201,168,76,0.06);
      border-color: rgba(201,168,76,0.45);
    }

    .nav-card__icon {
      display: block;
      font-size: 22px;
      margin-bottom: 10px;
      opacity: 0.7;
    }

    .nav-card__title {
      display: block;
      font-family: var(--font-display);
      font-style: italic;
      font-size: 18px;
      font-weight: 400;
      color: var(--cream);
      margin-bottom: 4px;
      transition: color 0.2s ease;
    }

    .nav-card:hover .nav-card__title { color: var(--gold); }

    .nav-card__sub {
      display: block;
      font-size: 8px;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.45);
    }

    .nav-card__arrow {
      display: block;
      margin-top: 12px;
      font-size: 14px;
      color: rgba(201,168,76,0);
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .nav-card:hover .nav-card__arrow {
      color: var(--gold);
      transform: translateX(4px);
    }

    /* ── Scorecard table ── */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

    .scores-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 660px;
      font-family: var(--font-body);
    }

    .scores-table thead tr { border-bottom: 1px solid rgba(201,168,76,0.32); }

    .scores-table th {
      padding: 10px 12px;
      text-align: left;
      color: var(--gold);
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .scores-table td {
      padding: 14px 12px;
      color: var(--cream);
      font-size: 13px;
      border-bottom: 1px solid var(--gold-rule);
      white-space: nowrap;
    }

    .scores-table tbody tr:last-child td { border-bottom: none; }
    .scores-table tbody tr { transition: background 0.2s ease; }
    .scores-table tbody tr:hover { background: rgba(201,168,76,0.04); }

    .rank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px; height: 20px;
      font-family: var(--font-display);
      font-style: italic;
      font-size: 11px;
      color: rgba(201,168,76,0.60);
      border: 1px solid rgba(201,168,76,0.18);
      margin-right: 10px;
    }

    .rank-1 {
      color: var(--gold);
      border-color: rgba(201,168,76,0.50);
      background: rgba(201,168,76,0.08);
    }

    .player-link {
      text-decoration: none;
      color: inherit;
    }
    .player-link:hover .player-name { color: var(--gold); }
    .player-link:hover .player-id   { color: rgba(201,168,76,0.80); }

    .player-name {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.02em;
      transition: color 0.2s ease;
    }

    .player-id {
      margin-left: 6px;
      color: rgba(201,168,76,0.50);
      font-size: 9px;
      letter-spacing: 0.14em;
      transition: color 0.2s ease;
    }

    .money-pos { color: var(--pos); }
    .money-neg { color: var(--neg); }
    .money-eve { color: var(--cream-dim); }

    .page-note {
      text-align: center;
      margin-top: 20px;
      font-size: 9px;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: rgba(201,168,76,0.35);
    }

    /* ── Season recap badge (R6 only) ── */
    .recap-badge {
      display: none;
      text-align: center;
      padding: 12px;
      border: 1px solid var(--gold-border);
      margin-bottom: 18px;
      font-size: 9px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      transition: background 0.2s ease;
    }
    .recap-badge:hover { background: rgba(201,168,76,0.06); }
    .recap-badge.visible { display: block; }

    @media (max-width: 600px) {
      .wrap        { padding: 32px 0 60px; }
      .header__title { font-size: 56px; }
      .standings   { grid-template-columns: repeat(2,1fr); }
      .round-result { grid-template-columns: repeat(2,1fr); }
      .nav-row     { grid-template-columns: 1fr; }
      .card        { padding: 18px 14px; }
    }
  </style>
</head>

<body>
  <div class="rule-top"></div>
  <a class="back" href="https://season0.pro/">←</a>

  <main class="wrap">

    <header class="header">
      <span class="header__kicker">Season 0 · Members</span>
      <h1 class="header__title" id="headerTitle">Clubhouse</h1>
      <span class="header__sub" id="headerSub">Season Standings</span>
    </header>

    <!-- Season standings bar — cumulative $ -->
    <div class="standings" id="seasonStandings"></div>

    <!-- Navigation row -->
    <nav class="nav-row">
      <a class="nav-card" href="https://season0.pro/members/scorecards/">
        <span class="nav-card__icon">⛳</span>
        <span class="nav-card__title">Scorecards</span>
        <span class="nav-card__sub">Round by round</span>
        <span class="nav-card__arrow">→</span>
      </a>
      <a class="nav-card" href="https://season0.pro/members/pairings/">
        <span class="nav-card__icon">⚔</span>
        <span class="nav-card__title">Pairings</span>
        <span class="nav-card__sub">Head to head</span>
        <span class="nav-card__arrow">→</span>
      </a>
      <a class="nav-card" href="https://season0.pro/members/players/">
        <span class="nav-card__icon">👤</span>
        <span class="nav-card__title">Players</span>
        <span class="nav-card__sub">Individual stats</span>
        <span class="nav-card__arrow">→</span>
      </a>
    </nav>

    <!-- Season Recap — only shows at R6 -->
    <a class="recap-badge" id="recapBadge" href="https://season0.pro/members/recap/">
      ★ Season Complete · View Final Recap →
    </a>

    <!-- Latest round summary -->
    <section class="card reveal">
      <p class="card__label" id="roundLabel">Latest Round</p>
      <div class="round-result" id="roundResult"></div>
    </section>

    <!-- Chart -->
    <section class="card reveal">
      <p class="card__label" id="chartLabel">Round $</p>
      <canvas id="roundChart"></canvas>
    </section>

    <!-- Full scorecard -->
    <section class="card reveal">
      <p class="card__label" id="scorecardLabel">Full Scorecard</p>
      <div class="table-wrap">
        <table class="scores-table">
          <thead>
            <tr>
              <th>Player</th>
              <th>Round $</th>
              <th>Gross</th>
              <th>Net</th>
              <th>Hole W</th>
              <th>Hole L</th>
              <th>Halves</th>
              <th>Birdies</th>
              <th>Wolf W</th>
              <th>Wolf L</th>
            </tr>
          </thead>
          <tbody id="roundTable"></tbody>
        </table>
      </div>
    </section>

    <p class="page-note" id="pageNote"></p>

  </main>

  <script>
    const latest   = SEASON.latestRound;
    const roundNum = latest.round;
    const rPlayed  = SEASON.roundsPlayed;

    // Build ordered array from latest round
    const ordered = SEASON.players.map(p => {
      const s = latest.scores[p.id];
      const st = SEASON.standings.find(x => x.id === p.id);
      return {
        playerId:   p.id,
        player:     p.name,
        short:      p.short,
        roundMoney: s.roundMoney,
        cumMoney:   st.cumMoney,
        bankroll:   st.bankroll,
        rank:       st.rank,
        gross:      s.gross,
        net:        s.net,
        holeWins:   s.holeWins,
        holeLosses: s.holeLosses,
        holeHalves: s.holeHalves,
        birdies:    s.birdies,
        wolfWins:   s.wolfWins,
        wolfLosses: s.wolfLosses,
      };
    }).sort((a, b) => b.roundMoney - a.roundMoney);

    // Standings sorted by cumMoney
    const byStanding = [...ordered].sort((a,b) => b.cumMoney - a.cumMoney);

    function moneyClass(v) { return v > 0 ? "money-pos" : v < 0 ? "money-neg" : "money-eve"; }
    function moneyText(v)  { return v > 0 ? "+$" + v : v < 0 ? "-$" + Math.abs(v) : "$0"; }
    function fmt(v)        { return v.toLocaleString(); }

    function countUp(el, target, duration) {
      const start = performance.now();
      const isNeg = target < 0;
      const abs   = Math.abs(target);
      function step(now) {
        const p   = Math.min((now - start) / duration, 1);
        const e   = 1 - Math.pow(1 - p, 3);
        const cur = Math.round(e * abs);
        el.textContent = (isNeg ? "-$" : target > 0 ? "+$" : "$") + cur;
        if (p < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    // ── Header ────────────────────────────────────────────
    document.getElementById("headerSub").textContent =
      `After Round ${roundNum} · ${rPlayed} of ${SEASON.config.rounds} played`;
    document.getElementById("roundLabel").textContent      = `Round ${roundNum} Results`;
    document.getElementById("chartLabel").textContent      = `Round ${roundNum} $`;
    document.getElementById("scorecardLabel").textContent  = `Round ${roundNum} · Full Scorecard`;
    document.getElementById("pageNote").textContent        =
      `Ranked by Round ${roundNum} $ · Season 0`;

    // ── Season Recap badge (R6 only) ──────────────────────
    if (rPlayed >= SEASON.config.rounds) {
      document.getElementById("recapBadge").classList.add("visible");
    }

    // ── Season standings bar ──────────────────────────────
    document.getElementById("seasonStandings").innerHTML = byStanding.map(p => `
      <a class="standing-stat" href="https://season0.pro/members/players/${p.playerId}/">
        <span class="standing-stat__rank">#${p.rank}</span>
        <span class="standing-stat__value ${p.cumMoney > 0 ? 'pos' : p.cumMoney < 0 ? 'neg' : ''}"
              data-target="${p.cumMoney}">$0</span>
        <span class="standing-stat__name">${p.short}</span>
        <span class="standing-stat__bankroll">$${fmt(p.bankroll)} bankroll</span>
        <span class="standing-stat__arrow">→</span>
      </a>
    `).join("");

    setTimeout(() => {
      document.querySelectorAll(".standing-stat__value[data-target]").forEach((el, i) => {
        setTimeout(() => countUp(el, parseInt(el.dataset.target), 900), i * 80);
      });
    }, 300);

    // ── Round result compact ──────────────────────────────
    document.getElementById("roundResult").innerHTML = ordered.map(p => `
      <div class="round-result__player">
        <span class="round-result__name">${p.short}</span>
        <span class="round-result__money ${p.roundMoney > 0 ? 'pos' : p.roundMoney < 0 ? 'neg' : 'eve'}">${moneyText(p.roundMoney)}</span>
        <span class="round-result__sub">${p.gross} gross · ${p.holeWins}W ${p.holeLosses}L</span>
      </div>
    `).join("");

    // ── Scorecard table ───────────────────────────────────
    document.getElementById("roundTable").innerHTML = ordered.map((p, i) => `
      <tr>
        <td>
          <span class="rank ${i === 0 ? 'rank-1' : ''}">${i + 1}</span>
          <a class="player-link" href="https://season0.pro/members/players/${p.playerId}/">
            <span class="player-name">${p.player}</span>
            <span class="player-id">${p.playerId}</span>
          </a>
        </td>
        <td class="${moneyClass(p.roundMoney)}">${moneyText(p.roundMoney)}</td>
        <td>${p.gross}</td>
        <td>${p.net}</td>
        <td>${p.holeWins}</td>
        <td>${p.holeLosses}</td>
        <td>${p.holeHalves}</td>
        <td>${p.birdies}</td>
        <td>${p.wolfWins}</td>
        <td>${p.wolfLosses}</td>
      </tr>
    `).join("");

    // ── Chart ─────────────────────────────────────────────
    new Chart(document.getElementById("roundChart"), {
      type: "bar",
      data: {
        labels: ordered.map(p => p.short),
        datasets: [{
          label: `Round ${roundNum} $`,
          data: ordered.map(p => p.roundMoney),
          backgroundColor: ordered.map(p => p.roundMoney >= 0 ? "rgba(201,168,76,0.20)" : "rgba(217,123,123,0.20)"),
          borderColor:     ordered.map(p => p.roundMoney >= 0 ? "rgba(201,168,76,0.85)" : "rgba(217,123,123,0.85)"),
          borderWidth: 1, borderRadius: 2
        }]
      },
      options: {
        responsive: true,
        animation: { duration: 1000, easing: 'easeOutQuart' },
        plugins: { legend: { display: false } },
        scales: {
          x: {
            ticks: { color: "rgba(240,235,224,0.50)", font: { family: "'Libre Baskerville',Georgia,serif", size: 11 } },
            grid:  { color: "rgba(201,168,76,0.05)" }
          },
          y: {
            ticks: {
              color: "rgba(240,235,224,0.50)",
              font:  { family: "'Libre Baskerville',Georgia,serif", size: 10 },
              callback: v => (v >= 0 ? "+$" : "-$") + Math.abs(v)
            },
            grid: { color: "rgba(201,168,76,0.05)" }
          }
        }
      }
    });

    // ── Scroll reveal ─────────────────────────────────────
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
</body>
</html>
