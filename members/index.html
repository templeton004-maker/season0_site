<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Season 0 Member Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      background: #06101f;
      color: #dce9ff;
      font-family: Georgia, serif;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 18px 70px;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .kicker {
      color: #5ea7ff;
      letter-spacing: .22em;
      text-transform: uppercase;
      font-size: 12px;
    }

    h1 {
      margin: 10px 0 4px;
      font-size: clamp(42px, 7vw, 82px);
      letter-spacing: .12em;
    }

    .sub {
      opacity: .8;
      font-size: 18px;
    }

    .card {
      background: rgba(8,14,28,.88);
      border: 1px solid rgba(94,167,255,.3);
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 26px;
      box-shadow: 0 12px 32px rgba(0,0,0,.35);
    }

    .chart-title {
      color: #5ea7ff;
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: 13px;
      margin-bottom: 18px;
    }

    canvas {
      max-height: 340px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 18px;
      background: rgba(8,14,28,.88);
      border: 1px solid rgba(94,167,255,.3);
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid rgba(255,255,255,.07);
      text-align: left;
    }

    th {
      color: #5ea7ff;
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: 11px;
      background: rgba(255,255,255,.04);
    }

    tr:last-child td {
      border-bottom: none;
    }

    .money-positive { color: #7dffb2; font-weight: bold; }
    .money-negative { color: #ff7d7d; font-weight: bold; }
    .money-even { color: #dce9ff; font-weight: bold; }

    .note {
      text-align: center;
      margin-top: 22px;
      opacity: .65;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="header">
      <div class="kicker">Season 0</div>
      <h1>Round 1 Stats</h1>
      <div class="sub">Condensed Member View</div>
    </section>

    <section class="card">
      <div class="chart-title">R1 Round $</div>
      <canvas id="r1Chart"></canvas>
    </section>

    <table>
      <thead>
        <tr>
          <th>Player</th>
          <th>Round $</th>
          <th>Total</th>
          <th>Net</th>
          <th>Hole Wins</th>
          <th>Hole Losses</th>
          <th>Hole Halves</th>
          <th>Birdies</th>
          <th>Wolf Wins</th>
          <th>Wolf Losses</th>
        </tr>
      </thead>
      <tbody id="r1Table"></tbody>
    </table>

    <div class="note">Player order is based on Round $ totals.</div>
  </main>

  <script>
    const r1Data = [
      {
        playerId: "KS",
        player: "Kyle Story",
        roundMoney: 16,
        total: 75,
        net: 75,
        holeWins: 8,
        holeLosses: 6,
        holeHalves: 4,
        birdies: 3,
        wolfWins: 4,
        wolfLosses: 0
      },
      {
        playerId: "MJ",
        player: "Michael Jones",
        roundMoney: 2,
        total: 97,
        net: 79,
        holeWins: 10,
        holeLosses: 4,
        holeHalves: 4,
        birdies: 0,
        wolfWins: 2,
        wolfLosses: 1
      },
      {
        playerId: "WT",
        player: "William Templeton",
        roundMoney: 0,
        total: 85,
        net: 81,
        holeWins: 5,
        holeLosses: 9,
        holeHalves: 4,
        birdies: 0,
        wolfWins: 3,
        wolfLosses: 2
      },
      {
        playerId: "JT",
        player: "John Templeton",
        roundMoney: -18,
        total: 80,
        net: 80,
        holeWins: 5,
        holeLosses: 9,
        holeHalves: 4,
        birdies: 1,
        wolfWins: 0,
        wolfLosses: 3
      }
    ];

    const ordered = [...r1Data].sort((a, b) => b.roundMoney - a.roundMoney);

    function moneyClass(value) {
      if (value > 0) return "money-positive";
      if (value < 0) return "money-negative";
      return "money-even";
    }

    function moneyText(value) {
      if (value > 0) return "+$" + value;
      if (value < 0) return "-$" + Math.abs(value);
      return "$0";
    }

    document.getElementById("r1Table").innerHTML = ordered.map(p => `
      <tr>
        <td>${p.player} (${p.playerId})</td>
        <td class="${moneyClass(p.roundMoney)}">${moneyText(p.roundMoney)}</td>
        <td>${p.total}</td>
        <td>${p.net}</td>
        <td>${p.holeWins}</td>
        <td>${p.holeLosses}</td>
        <td>${p.holeHalves}</td>
        <td>${p.birdies}</td>
        <td>${p.wolfWins}</td>
        <td>${p.wolfLosses}</td>
      </tr>
    `).join("");

    new Chart(document.getElementById("r1Chart"), {
      type: "bar",
      data: {
        labels: ordered.map(p => p.player),
        datasets: [{
          label: "Round $",
          data: ordered.map(p => p.roundMoney),
          backgroundColor: ordered.map(p =>
            p.roundMoney >= 0 ? "rgba(94,167,255,.72)" : "rgba(255,125,125,.72)"
          ),
          borderColor: ordered.map(p =>
            p.roundMoney >= 0 ? "#7bb7ff" : "#ff9b9b"
          ),
          borderWidth: 2,
          borderRadius: 8
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            labels: { color: "#dce9ff" }
          }
        },
        scales: {
          x: {
            ticks: { color: "#dce9ff" },
            grid: { color: "rgba(255,255,255,.05)" }
          },
          y: {
            ticks: {
              color: "#dce9ff",
              callback: value => "$" + value
            },
            grid: { color: "rgba(255,255,255,.06)" }
          }
        }
      }
    });
  </script>
</body>
</html>
