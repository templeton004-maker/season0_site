<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Season 0 Member Portal</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(rgba(5,5,5,.72), rgba(5,5,5,.85)),
        url("/preview.jpg") center/cover no-repeat;
      color: #f5f0e6;
      font-family: Georgia, serif;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .kicker {
      letter-spacing: .22em;
      color: #d6b25e;
      font-size: 13px;
      text-transform: uppercase;
    }

    h1 {
      margin: 10px 0;
      font-size: clamp(42px, 7vw, 82px);
      letter-spacing: .12em;
    }

    .sub {
      opacity: .85;
      font-size: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-bottom: 32px;
    }

    .card {
      background: rgba(10, 10, 10, .78);
      border: 1px solid rgba(214, 178, 94, .38);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
    }

    .label {
      color: #d6b25e;
      letter-spacing: .16em;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .stat {
      font-size: 42px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(10, 10, 10, .78);
      border: 1px solid rgba(214, 178, 94, .38);
      border-radius: 18px;
      overflow: hidden;
    }

    th, td {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,.12);
      text-align: left;
    }

    th {
      color: #d6b25e;
      letter-spacing: .12em;
      font-size: 12px;
      text-transform: uppercase;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .note {
      margin-top: 22px;
      text-align: center;
      opacity: .7;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="header">
      <div class="kicker">Member Portal</div>
      <h1>GL S0</h1>
      <div class="sub">Round 1 Stats</div>
    </section>

    <section class="grid">
      <div class="card">
        <div class="label">Round</div>
        <div class="stat">R1</div>
      </div>

      <div class="card">
        <div class="label">Format</div>
        <div class="stat">Wolf</div>
      </div>

      <div class="card">
        <div class="label">Status</div>
        <div class="stat">Live</div>
      </div>

      <div class="card">
        <div class="label">Season</div>
        <div class="stat">0</div>
      </div>
    </section>

    <table>
      <thead>
        <tr>
          <th>Player</th>
          <th>Score</th>
          <th>Points</th>
          <th>Wolf Notes</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>John</td>
          <td>—</td>
          <td>—</td>
          <td>Pending R1 data</td>
        </tr>
        <tr>
          <td>Mike</td>
          <td>—</td>
          <td>—</td>
          <td>Pending R1 data</td>
        </tr>
        <tr>
          <td>Will</td>
          <td>—</td>
          <td>—</td>
          <td>Pending R1 data</td>
        </tr>
        <tr>
          <td>Matt</td>
          <td>—</td>
          <td>—</td>
          <td>Pending R1 data</td>
        </tr>
      </tbody>
    </table>

    <div class="note">
      Access granted. Round 1 stats will update here.
    </div>
  </main>
</body>
</html>
