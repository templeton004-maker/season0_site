<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Season 0 Member Portal</title>

  <!-- Open Graph -->
  <meta property="og:title" content="SEASON 0">
  <meta property="og:description" content="Round 1 Member Portal">
  <meta property="og:image" content="https://season0.pro/preview.jpg">
  <meta property="og:url" content="https://season0.pro/member.html">
  <meta property="og:type" content="website">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="SEASON 0">
  <meta name="twitter:description" content="Round 1 Member Portal">
  <meta name="twitter:image" content="https://season0.pro/preview.jpg">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;

      background:
        linear-gradient(rgba(3,7,15,.82), rgba(3,7,15,.92)),
        url("/preview.jpg") center/cover no-repeat;

      color: #dce9ff;
      font-family: Georgia, serif;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .kicker {
      color: #5ea7ff;
      letter-spacing: .24em;
      text-transform: uppercase;
      font-size: 12px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(48px, 8vw, 92px);
      letter-spacing: .14em;
      font-weight: 700;
    }

    .sub {
      margin-top: 14px;
      opacity: .82;
      font-size: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-bottom: 34px;
    }

    .card {
      background: rgba(8,14,28,.82);

      border: 1px solid rgba(94,167,255,.28);

      border-radius: 18px;

      padding: 24px;

      backdrop-filter: blur(10px);

      box-shadow:
        0 10px 30px rgba(0,0,0,.35),
        inset 0 0 0 1px rgba(255,255,255,.02);
    }

    .label {
      color: #5ea7ff;
      text-transform: uppercase;
      letter-spacing: .16em;
      font-size: 11px;
      margin-bottom: 10px;
    }

    .stat {
      font-size: 42px;
      font-weight: bold;
    }

    .chart-card {
      background: rgba(8,14,28,.82);

      border: 1px solid rgba(94,167,255,.28);

      border-radius: 18px;

      padding: 26px;

      margin-bottom: 32px;

      backdrop-filter: blur(10px);

      box-shadow:
        0 10px 30px rgba(0,0,0,.35),
        inset 0 0 0 1px rgba(255,255,255,.02);
    }

    .chart-title {
      color: #5ea7ff;
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: 14px;
      margin-bottom: 20px;
    }

    canvas {
      max-height: 360px;
    }

    table {
      width: 100%;
      border-collapse: collapse;

      background: rgba(8,14,28,.82);

      border: 1px solid rgba(94,167,255,.28);

      border-radius: 18px;

      overflow: hidden;

      backdrop-filter: blur(10px);

      box-shadow:
        0 10px 30px rgba(0,0,0,.35),
        inset 0 0 0 1px rgba(255,255,255,.02);
    }

    th {
      background: rgba(255,255,255,.03);

      color: #5ea7ff;

      text-transform: uppercase;

      letter-spacing: .14em;

      font-size: 11px;
    }

    th,
    td {
      padding: 18px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    tr:last-child td {
      border-bottom: none;
    }

    .note {
      text-align: center;
      margin-top: 26px;
      opacity: .68;
      font-size: 14px;
    }

    .portal-button {
      display: inline-block;

      margin-top: 24px;

      padding: 14px 24px;

      border-radius: 12px;

      text-decoration: none;

      color: #dce9ff;

      border: 1px solid rgba(94,167,255,.35);

      background: rgba(94,167,255,.08);

      transition: .2s ease;
    }

    .portal-button:hover {
      background: rgba(94,167,255,.16);
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

  <main class="wrap">

    <section class="header">

      <div class="kicker">
        Member Portal
      </div>

      <h1>
        GL S0
      </h1>

      <div class="sub">
        Round 1 Statistics
      </div>

    </section>

    <section class="grid">

      <div class="card">
        <div class="label">Round</div>
        <div class="stat">R1</div>
      </div>

      <div class="card">
        <div class="label">Format</div>
        <div class="stat">Wolf</div>
      </div>

      <div class="card">
        <div class="label">Status</div>
        <div class="stat">Live</div>
      </div>

      <div class="card">
        <div class="label">Season</div>
        <div class="stat">0</div>
      </div>

    </section>

    <section class="chart-card">

      <div class="chart-title">
        R1 Points Chart
      </div>

      <canvas id="r1Chart"></canvas>

    </section>

    <table>

      <thead>
        <tr>
          <th>Player</th>
          <th>Score</th>
          <th>Points</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody>

        <tr>
          <td>John</td>
          <td>-</td>
          <td>0</td>
          <td>Pending</td>
        </tr>

        <tr>
          <td>Mike</td>
          <td>-</td>
          <td>0</td>
          <td>Pending</td>
        </tr>

        <tr>
          <td>Will</td>
          <td>-</td>
          <td>0</td>
          <td>Pending</td>
        </tr>

        <tr>
          <td>Matt</td>
          <td>-</td>
          <td>0</td>
          <td>Pending</td>
        </tr>

      </tbody>

    </table>

    <div class="note">
      Season 0 · Member Access Confirmed
    </div>

  </main>

  <script>
    const ctx = document.getElementById("r1Chart");

    new Chart(ctx, {
      type: "bar",

      data: {
        labels: ["John", "Mike", "Will", "Matt"],

        datasets: [{
          label: "R1 Points",

          data: [0, 0, 0, 0],

          backgroundColor: [
            "rgba(94,167,255,.78)",
            "rgba(94,167,255,.68)",
            "rgba(94,167,255,.58)",
            "rgba(94,167,255,.48)"
          ],

          borderColor: [
            "#7bb7ff",
            "#7bb7ff",
            "#7bb7ff",
            "#7bb7ff"
          ],

          borderWidth: 2,

          borderRadius: 8
        }]
      },

      options: {
        responsive: true,

        plugins: {
          legend: {
            labels: {
              color: "#dce9ff"
            }
          }
        },

        scales: {

          x: {
            ticks: {
              color: "#dce9ff"
            },

            grid: {
              color: "rgba(255,255,255,.05)"
            }
          },

          y: {
            beginAtZero: true,

            ticks: {
              color: "#dce9ff"
            },

            grid: {
              color: "rgba(255,255,255,.05)"
            }
          }

        }
      }
    });
  </script>

</body>
</html>
