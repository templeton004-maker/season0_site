<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Season 0 — Clubhouse</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="../styles.css?v=36" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --members-bg-top:    #08111e;
      --members-bg-bottom: #050d18;
      --members-surface:   rgba(8, 14, 26, 0.90);
      --members-border:    rgba(200, 162, 93, 0.18);
      --members-border-th: rgba(200, 162, 93, 0.28);
      --members-rule:      rgba(200, 162, 93, 0.10);
      --pos-color: #7ecf9e;
      --neg-color: #d97b7b;
      --neu-color: var(--color-text-primary);
    }

    body.members {
      background:
        radial-gradient(ellipse 80% 40% at 50% 0%, rgba(200,162,93,0.06) 0%, transparent 60%),
        linear-gradient(175deg, var(--members-bg-top) 0%, var(--members-bg-bottom) 100%);
      min-height: 100vh;
      font-family: var(--font-serif);
    }

    .members-wrap {
      width: min(1100px, 92vw);
      margin: 0 auto;
      padding: 56px 0 90px;
    }

    .members-header {
      text-align: center;
      margin-bottom: 52px;
      position: relative;
    }

    .members-header::after {
      content: '';
      display: block;
      width: 48px;
      height: 1px;
      background: var(--color-gold);
      margin: 28px auto 0;
      opacity: 0.5;
    }

    .members-kicker {
      display: inline-block;
      color: var(--color-gold);
      font-size: 10px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .members-h1 {
      font-family: var(--font-display);
      font-size: clamp(48px, 8vw, 88px);
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--color-text-primary);
      margin: 0 0 10px;
      line-height: 1;
    }

    .members-sub {
      color: var(--color-text-secondary);
      font-size: 13px;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      opacity: 0.75;
    }

    .section-label {
      color: var(--color-gold);
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      margin: 0 0 20px;
    }

    .members-card {
      background: var(--members-surface);
      border: 1px solid var(--members-border);
      padding: 32px;
      margin-bottom: 24px;
      backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }

    .members-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 40px; height: 40px;
      border-top: 1px solid rgba(200,162,93,0.40);
      border-left: 1px solid rgba(200,162,93,0.40);
    }

    .members-card::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 40px; height: 40px;
      border-bottom: 1px solid rgba(200,162,93,0.40);
      border-right: 1px solid rgba(200,162,93,0.40);
    }

    canvas {
      max-height: 300px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .scores-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
      font-family: var(--font-serif);
    }

    .scores-table thead tr {
      border-bottom: 1px solid var(--members-border-th);
    }

    .scores-table th {
      padding: 12px 14px;
      text-align: left;
      color: var(--color-gold);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .scores-table td {
      padding: 15px 14px;
      color: var(--color-text-primary);
      font-size: 14px;
      border-bottom: 1px solid var(--members-rule);
    }

    .scores-table tbody tr:last-child td {
      border-bottom: none;
    }

    .scores-table tbody tr {
      transition: background 0.25s ease;
    }

    .scores-table tbody tr:hover {
      background: rgba(200, 162, 93, 0.04);
    }

    .player-name {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.04em;
    }

    .player-id {
      display: inline-block;
      margin-left: 6px;
      color: var(--color-text-secondary);
      font-size: 11px;
      letter-spacing: 0.12em;
      opacity: 0.7;
    }

    .money-positive { color: var(--pos-color); font-weight: 400; }
    .money-negative { color: var(--neg-color); font-weight: 400; }
    .money-even     { color: var(--neu-color); font-weight: 400; }

    .members-note {
      text-align: center;
      margin-top: 28px;
      color: var(--color-text-secondary);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.55;
    }

    @media (max-width: 768px) {
      .members-wrap  { padding: 32px 0 60px; }
      .members-card  { padding: 20px 16px; }
      .members-h1    { font-size: 52px; }
    }
  </style>
</head>

<body class="members">
  <main class="members-wrap">

    <header class="members-header">
      <div class="members-kicker">Season 0</div>
      <h1 class="members-h1">Round 1</h1>
      <div class="members-sub">Clubhouse Standings</div>
    </header>

    <section class="members-card">
      <p class="section-label">Round $</p>
      <canvas id="r1Chart"></canvas>
    </section>

    <section class="members-card">
      <p class="section-label">Full Scorecard</p>
      <div class="table-wrap">
        <table class="scores-table">
          <thead>
            <tr>
              <th>Player</th>
              <th>Round $</th>
              <th>Total</th>
              <th>Net</th>
              <th>Hole Wins</th>
              <th>Hole Losses</th>
              <th>Halves</th>
              <th>Birdies</th>
              <th>Wolf W</th>
              <th>Wolf L</th>
            </tr>
          </thead>
          <tbody id="r1Table"></tbody>
        </table>
      </div>
    </section>

    <p class="members-note">Ranked by Round $</p>

  </main>

  <script>
    const r1Data = [
      {
        playerId: "KS",
        player: "Kyle Story",
        roundMoney: 16,
        total: 75,
        net: 75,
        holeWins: 8,
        holeLosses: 6,
        holeHalves: 4,
        birdies: 3,
        wolfWins: 4,
        wolfLosses: 0
      },
      {
        playerId: "MJ",
        player: "Michael Jones",
        roundMoney: 2,
        total: 97,
        net: 79,
        holeWins: 10,
        holeLosses: 4,
        holeHalves: 4,
        birdies: 0,
        wolfWins: 2,
        wolfLosses: 1
      },
      {
        playerId: "WT",
        player: "William Templeton",
        roundMoney: 0,
        total: 85,
        net: 81,
        holeWins: 5,
        holeLosses: 9,
        holeHalves: 4,
        birdies: 0,
        wolfWins: 3,
        wolfLosses: 2
      },
      {
        playerId: "JT",
        player: "John Templeton",
        roundMoney: -18,
        total: 80,
        net: 80,
        holeWins: 5,
        holeLosses: 9,
        holeHalves: 4,
        birdies: 1,
        wolfWins: 0,
        wolfLosses: 3
      }
    ];

    const ordered = [...r1Data].sort((a, b) => b.roundMoney - a.roundMoney);

    function moneyClass(v) {
      return v > 0 ? "money-positive" : v < 0 ? "money-negative" : "money-even";
    }

    function moneyText(v) {
      return v > 0 ? "+$" + v : v < 0 ? "-$" + Math.abs(v) : "$0";
    }

    document.getElementById("r1Table").innerHTML = ordered.map(p => `
      <tr>
        <td>
          <span class="player-name">${p.player}</span>
          <span class="player-id">${p.playerId}</span>
        </td>
        <td class="${moneyClass(p.roundMoney)}">${moneyText(p.roundMoney)}</td>
        <td>${p.total}</td>
        <td>${p.net}</td>
        <td>${p.holeWins}</td>
        <td>${p.holeLosses}</td>
        <td>${p.holeHalves}</td>
        <td>${p.birdies}</td>
        <td>${p.wolfWins}</td>
        <td>${p.wolfLosses}</td>
      </tr>
    `).join("");

    new Chart(document.getElementById("r1Chart"), {
      type: "bar",
      data: {
        labels: ordered.map(p => p.player),
        datasets: [{
          label: "Round $",
          data: ordered.map(p => p.roundMoney),
          backgroundColor: ordered.map(p =>
            p.roundMoney >= 0
              ? "rgba(200, 162, 93, 0.30)"
              : "rgba(217, 123, 123, 0.30)"
          ),
          borderColor: ordered.map(p =>
            p.roundMoney >= 0 ? "rgba(200,162,93,0.85)" : "rgba(217,123,123,0.85)"
          ),
          borderWidth: 1,
          borderRadius: 2
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false }
        },
        scales: {
          x: {
            ticks: {
              color: "rgba(244,239,228,0.60)",
              font: { family: "Georgia, serif", size: 12 }
            },
            grid: { color: "rgba(200,162,93,0.06)" }
          },
          y: {
            ticks: {
              color: "rgba(244,239,228,0.60)",
              font: { family: "Georgia, serif", size: 11 },
              callback: v => (v >= 0 ? "+$" : "-$") + Math.abs(v)
            },
            grid: { color: "rgba(200,162,93,0.06)" }
          }
        }
      }
    });
  </script>
</body>
</html>
