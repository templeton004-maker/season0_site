<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Season 0</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=37" />

  <style>
    /* ── Grain overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      opacity: 0.032;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    /* ── Entrance animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.96); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      width: 100vw;
      min-height: 100dvh;
      background-image:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.60)),
        url("./assets/images/hero-bg.png?v=2");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      animation: fadeIn 1.2s ease both;
    }

    /* ── Countdown card ── */
    .countdown-card {
      position: absolute;
      top: 38%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 92vw;
      max-width: 860px;
      padding: clamp(20px, 5vw, 40px) clamp(14px, 5vw, 48px);
      text-align: center;
      background: rgba(8, 14, 10, 0.52);
      border: 1px solid rgba(200, 162, 93, 0.28);
      backdrop-filter: blur(10px);
      /* inner top highlight — frosted glass effect */
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 24px 64px rgba(0,0,0,0.45);
      animation: scaleIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
    }

    /* ── Eyebrow ── */
    .eyebrow {
      margin: 0 0 clamp(14px, 3vw, 24px);
      color: var(--color-gold);
      font-size: clamp(8px, 2vw, 11px);
      letter-spacing: clamp(0.18em, 0.8vw, 0.36em);
      text-transform: uppercase;
      font-family: Georgia, serif;
      animation: fadeUp 0.7s ease 0.5s both;
    }

    /* ── Countdown row ── */
    .countdown {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: clamp(6px, 3vw, 40px);
      white-space: nowrap;
    }

    .countdown__unit {
      flex: 1 1 0;
      min-width: 0;
      animation: fadeUp 0.7s ease both;
    }

    .countdown__unit:nth-child(1) { animation-delay: 0.55s; }
    .countdown__unit:nth-child(2) { animation-delay: 0.65s; }
    .countdown__unit:nth-child(3) { animation-delay: 0.75s; }
    .countdown__unit:nth-child(4) { animation-delay: 0.85s; }

    .countdown__number {
      display: block;
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: #f4efe4;
      font-size: clamp(36px, 13vw, 112px);
      font-weight: 300;
      line-height: 0.9;
      letter-spacing: 0.02em;
      /* subtle text shadow for depth */
      text-shadow: 0 2px 24px rgba(0,0,0,0.5);
    }

    .countdown__label {
      display: block;
      margin-top: clamp(8px, 2vw, 16px);
      color: var(--color-gold);
      font-size: clamp(6px, 1.6vw, 10px);
      letter-spacing: clamp(0.10em, 0.6vw, 0.28em);
      text-transform: uppercase;
      opacity: 0.85;
    }

    /* Divider between units */
    .countdown__sep {
      align-self: flex-start;
      padding-top: clamp(4px, 1.5vw, 12px);
      color: rgba(200,162,93,0.35);
      font-size: clamp(24px, 8vw, 72px);
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      line-height: 0.9;
      user-select: none;
    }

    /* ── Expired state ── */
    .expired {
      color: #f4efe4;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(22px, 6vw, 36px);
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    /* ── Access button ── */
    .access-btn {
      position: absolute;
      left: 50%;
      bottom: 9%;
      transform: translateX(-50%);
      display: inline-block;
      padding: clamp(10px, 2vw, 14px) clamp(20px, 4vw, 32px);
      color: #f4efe4;
      text-decoration: none;
      text-align: center;
      text-transform: uppercase;
      font-size: clamp(9px, 2vw, 11px);
      letter-spacing: clamp(0.16em, 0.7vw, 0.30em);
      font-family: Georgia, serif;
      border: 1px solid rgba(200, 162, 93, 0.65);
      background: rgba(31, 58, 45, 0.42);
      backdrop-filter: blur(6px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      transition: background 0.3s ease, border-color 0.3s ease, letter-spacing 0.3s ease;
      animation: fadeUp 0.7s ease 1.0s both;
      white-space: nowrap;
    }

    .access-btn:hover {
      background: rgba(200, 162, 93, 0.18);
      border-color: rgba(244, 239, 228, 0.80);
      letter-spacing: clamp(0.20em, 0.8vw, 0.36em);
    }

    /* ── Mobile tweaks ── */
    @media (max-width: 480px) {
      .countdown-card {
        top: 40%;
      }
      .countdown__sep {
        display: none;
      }
    }
  </style>

</head>
<body>

  <main class="hero">

    <section class="countdown-card">
      <p class="eyebrow">&nbsp;</p>

      <div class="countdown" id="countdown">
        <div class="countdown__unit">
          <span class="countdown__number" id="days">00</span>
          <label class="countdown__label">Days</label>
        </div>

        <span class="countdown__sep">·</span>

        <div class="countdown__unit">
          <span class="countdown__number" id="hours">00</span>
          <label class="countdown__label">Hours</label>
        </div>

        <span class="countdown__sep">·</span>

        <div class="countdown__unit">
          <span class="countdown__number" id="minutes">00</span>
          <label class="countdown__label">Minutes</label>
        </div>

        <span class="countdown__sep">·</span>

        <div class="countdown__unit">
          <span class="countdown__number" id="seconds">00</span>
          <label class="countdown__label">Seconds</label>
        </div>
      </div>
    </section>

    <a class="access-btn" href="https://season0.pro/members/">
      Request Access
    </a>

  </main>

  <script>
    const targetDate = new Date("2026-05-21T17:40:00-05:00").getTime();

    function updateCountdown() {
      const now      = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        document.getElementById("countdown").innerHTML =
          "<p class='expired'>Season 0 Has Begun</p>";
        return;
      }

      const days    = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours   = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      document.getElementById("days").textContent    = String(days).padStart(2, "0");
      document.getElementById("hours").textContent   = String(hours).padStart(2, "0");
      document.getElementById("minutes").textContent = String(minutes).padStart(2, "0");
      document.getElementById("seconds").textContent = String(seconds).padStart(2, "0");
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    /* Cloudflare Access check */
    const accessBtn = document.querySelector(".access-btn");
    if (document.cookie.includes("CF_Authorization")) {
      accessBtn.textContent = "Return to Clubhouse";
    } else {
      accessBtn.textContent = "Request Access";
    }
  </script>

</body>
</html>
