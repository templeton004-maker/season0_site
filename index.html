<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Season 0</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink:         #080e0b;
      --gold:        #c9a84c;
      --gold-border: rgba(201, 168, 76, 0.24);
      --gold-dim:    rgba(201, 168, 76, 0.10);
      --cream:       #f0ebe0;
      --cream-dim:   rgba(240, 235, 224, 0.45);
      --cream-faint: rgba(240, 235, 224, 0.07);
      --green-glow:  rgba(18, 42, 26, 0.70);
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body:    'Libre Baskerville', Georgia, serif;
      --ease:         cubic-bezier(0.22, 1, 0.36, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; overflow-x: hidden; }

    body {
      font-family: var(--font-body);
      background: var(--ink);
      color: var(--cream);
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      opacity: 0.030;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse 75% 55% at 50% 38%, var(--green-glow) 0%, transparent 70%);
    }

    .rule-top {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      z-index: 10;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(60px, 10vw, 100px) clamp(20px, 6vw, 60px) clamp(40px, 6vw, 80px);
      gap: clamp(36px, 6vw, 64px);
    }

    .wordmark {
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.9s var(--ease) 0.1s forwards;
    }

    .wordmark__eyebrow {
      display: block;
      font-family: var(--font-body);
      font-size: 10px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: clamp(10px, 2vw, 18px);
    }

    .wordmark__title {
      font-family: var(--font-display);
      font-size: clamp(80px, 20vw, 180px);
      font-weight: 400;
      line-height: 0.88;
      color: var(--cream);
      letter-spacing: -0.02em;
      font-style: italic;
    }

    .countdown-wrap {
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.9s var(--ease) 0.28s forwards;
    }

    .countdown-label {
      font-size: 9px;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: clamp(14px, 2.5vw, 22px);
      display: block;
    }

    .countdown {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: clamp(8px, 3vw, 32px);
    }

    .countdown__unit {
      text-align: center;
      min-width: 0;
    }

    .countdown__number {
      display: block;
      font-family: var(--font-display);
      font-size: clamp(40px, 11vw, 96px);
      font-weight: 400;
      line-height: 1;
      color: var(--cream);
      letter-spacing: 0.02em;
    }

    .countdown__label {
      display: block;
      margin-top: 6px;
      font-size: clamp(7px, 1.4vw, 9px);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
    }

    .countdown__sep {
      font-family: var(--font-display);
      font-size: clamp(28px, 7vw, 64px);
      color: var(--gold-border);
      line-height: 1.1;
      user-select: none;
      padding-top: 2px;
    }

    .expired {
      font-family: var(--font-display);
      font-size: clamp(18px, 5vw, 28px);
      font-style: italic;
      color: var(--cream);
      letter-spacing: 0.10em;
    }

    .standings {
      width: 100%;
      max-width: 320px;
      opacity: 0;
      animation: fadeUp 0.9s var(--ease) 0.44s forwards;
    }

    .standings__label {
      font-size: 9px;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      margin-bottom: clamp(12px, 2vw, 18px);
      display: block;
    }

    .standings__list {
      list-style: none;
      border-top: 1px solid var(--gold-border);
    }

    .standings__item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 0;
      border-bottom: 1px solid var(--cream-faint);
    }

    .standings__item:last-child {
      border-bottom: 1px solid var(--gold-border);
    }

    .standings__rank {
      font-size: 10px;
      color: var(--gold);
      letter-spacing: 0.12em;
      width: 20px;
      text-align: center;
      font-family: var(--font-display);
      font-style: italic;
    }

    .standings__initial {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 400;
      color: var(--cream);
      letter-spacing: 0.08em;
      flex: 1;
      padding: 0 12px;
    }

    .standings__delta {
      font-size: 12px;
      letter-spacing: 0.06em;
      font-family: var(--font-display);
    }

    .standings__delta.pos { color: #7ecf9e; }
    .standings__delta.neg { color: #d97b7b; }
    .standings__delta.eve { color: var(--cream-dim); }

    .standings__locked {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--cream-dim);
      text-align: center;
      margin-top: 10px;
    }

    .cta-wrap {
      opacity: 0;
      animation: fadeUp 0.9s var(--ease) 0.58s forwards;
    }

    .cta {
      display: inline-block;
      padding: clamp(11px, 2vw, 14px) clamp(30px, 5vw, 50px);
      font-family: var(--font-body);
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--cream);
      border: 1px solid var(--gold-border);
      background: transparent;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s ease;
      white-space: nowrap;
    }

    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold-dim);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s var(--ease);
    }

    .cta:hover::before { transform: scaleX(1); }
    .cta:hover         { border-color: rgba(201,168,76,0.55); }
    .cta span          { position: relative; z-index: 1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 420px) {
      .countdown__sep { display: none; }
      .countdown { gap: clamp(14px, 5vw, 24px); }
    }
  </style>
</head>

<body>
  <div class="rule-top"></div>

  <main class="page">

    <div class="wordmark">
      <span class="wordmark__eyebrow">Wolf Hammer</span>
      <h1 class="wordmark__title">Season 0</h1>
    </div>

    <div class="countdown-wrap">
      <span class="countdown-label" id="countdownLabel">Round 2 Begins</span>
      <div class="countdown" id="countdown">
        <div class="countdown__unit">
          <span class="countdown__number" id="days">00</span>
          <label class="countdown__label">Days</label>
        </div>
        <span class="countdown__sep">·</span>
        <div class="countdown__unit">
          <span class="countdown__number" id="hours">00</span>
          <label class="countdown__label">Hours</label>
        </div>
        <span class="countdown__sep">·</span>
        <div class="countdown__unit">
          <span class="countdown__number" id="minutes">00</span>
          <label class="countdown__label">Minutes</label>
        </div>
        <span class="countdown__sep">·</span>
        <div class="countdown__unit">
          <span class="countdown__number" id="seconds">00</span>
          <label class="countdown__label">Seconds</label>
        </div>
      </div>
    </div>

    <div class="standings">
      <span class="standings__label">Current Standings</span>
      <ul class="standings__list" id="standingsList"></ul>
      <p class="standings__locked">Full stats · Members only</p>
    </div>

    <div class="cta-wrap">
      <a class="cta" href="https://season0.pro/members/" id="ctaBtn">
        <span>Enter Clubhouse</span>
      </a>
    </div>

  </main>

  <script>
    const r2Date = new Date("2026-05-31T07:32:00-05:00").getTime();

    const standings = [
      { initial: "K", rank: 1, trend: "pos" },
      { initial: "M", rank: 2, trend: "pos" },
      { initial: "W", rank: 3, trend: "eve" },
      { initial: "J", rank: 4, trend: "neg" },
    ];

    document.getElementById("standingsList").innerHTML =
      standings.map(p => `
        <li class="standings__item">
          <span class="standings__rank">${p.rank}</span>
          <span class="standings__initial">${p.initial}</span>
          <span class="standings__delta ${p.trend}">
            ${p.trend === "pos" ? "▲" : p.trend === "neg" ? "▼" : "—"}
          </span>
        </li>
      `).join("");

    function updateCountdown() {
      const distance = r2Date - Date.now();
      if (distance <= 0) {
        document.getElementById("countdown").innerHTML = "<p class='expired'>Round 2 Underway</p>";
        document.getElementById("countdownLabel").style.display = "none";
        return;
      }
      const d = Math.floor(distance / 86400000);
      const h = Math.floor((distance / 3600000) % 24);
      const m = Math.floor((distance / 60000) % 60);
      const s = Math.floor((distance / 1000) % 60);
      document.getElementById("days").textContent    = String(d).padStart(2,"0");
      document.getElementById("hours").textContent   = String(h).padStart(2,"0");
      document.getElementById("minutes").textContent = String(m).padStart(2,"0");
      document.getElementById("seconds").textContent = String(s).padStart(2,"0");
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    const ctaBtn = document.getElementById("ctaBtn");
    if (document.cookie.includes("CF_Authorization")) {
      ctaBtn.querySelector("span").textContent = "Return to Clubhouse";
    }
  </script>

</body>
</html>
