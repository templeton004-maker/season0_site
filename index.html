<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Season 0</title>

  <link
    rel="stylesheet"
    href="./style.css?v=31"
  />

</head>

<body>

  <main class="hero">

    <section class="countdown-card">

      <p class="eyebrow">
        Countdown to Season 0
      </p>

      <div class="countdown" id="countdown">

        <div>
          <span id="days">00</span>
          <label>Days</label>
        </div>

        <div>
          <span id="hours">00</span>
          <label>Hours</label>
        </div>

        <div>
          <span id="minutes">00</span>
          <label>Minutes</label>
        </div>

        <div>
          <span id="seconds">00</span>
          <label>Seconds</label>
        </div>

      </div>

    </section>

    <a
      class="access-button"
      href="https://season0.pro/members/"
    >
      Request Access
    </a>

  </main>

  <script>

    const targetDate =
      new Date("2026-05-21T17:00:00-05:00").getTime();

    function updateCountdown() {

      const now = new Date().getTime();

      const distance = targetDate - now;

      if (distance <= 0) {

        document.getElementById("countdown").innerHTML =
          "<p class='expired'>Season 0 Has Begun</p>";

        return;
      }

      const days =
        Math.floor(distance / (1000 * 60 * 60 * 24));

      const hours =
        Math.floor((distance / (1000 * 60 * 60)) % 24);

      const minutes =
        Math.floor((distance / (1000 * 60)) % 60);

      const seconds =
        Math.floor((distance / 1000) % 60);

      document.getElementById("days").textContent =
        String(days).padStart(2, "0");

      document.getElementById("hours").textContent =
        String(hours).padStart(2, "0");

      document.getElementById("minutes").textContent =
        String(minutes).padStart(2, "0");

      document.getElementById("seconds").textContent =
        String(seconds).padStart(2, "0");
    }

    updateCountdown();

    setInterval(updateCountdown, 1000);

    /* =========================
       CLOUDFLARE ACCESS CHECK
    ========================= */

    const accessButton =
      document.querySelector(".access-button");

    if (
      document.cookie.includes("CF_Authorization")
    ) {

      accessButton.textContent =
        "Return to Clubhouse";

    } else {

      accessButton.textContent =
        "Request Access";

    }

  </script>

</body>
</html>
